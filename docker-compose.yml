version: '3.8'

services:
  # Frontend (served by web server like Nginx)
  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:5000

  # Backend API Server (Phase 6)
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/models:/app/models
    environment:
      - FLASK_ENV=production
      - DEBUG=False
      - PORT=5000
      - GOOGLE_CLOUD_PROJECT=docugraph
      - TORCH_HOME=/app/models
      - HF_HOME=/app/models
    cap_add:
      - SYS_RESOURCE
    ulimits:
      memlock: -1
      stack: 67108864
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # Optional: Redis for caching (future enhancement)
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data

volumes:
  # redis-data:

networks:
  default:
    name: docugraph-network
