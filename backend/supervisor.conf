[program:docugraph-backend]
command=/usr/bin/python3 /path/to/DOCUGRAPH_WEBSITE/backend/run_production.py
directory=/path/to/DOCUGRAPH_WEBSITE/backend
user=www-data
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/docugraph-backend.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=10
environment=FLASK_ENV=production,PORT=5000,WORKERS=4
priority=999
stopasgroup=true
killasgroup=true

; Resource limits
; Uncomment these to limit resource usage
; memmonitor=524288

; Logging
loglevel=info
logfile=/var/log/supervisor/docugraph-backend-supervisor.log
logfile_maxbytes=50MB
logfile_backups=10

; Event listener for crash notifications
eventlistener=docugraph-crash-listener TICK_60
buffer_size=100
events=PROCESS_STATE
result_handler=docugraph-crash-handler
